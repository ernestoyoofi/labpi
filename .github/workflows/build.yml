name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: windows
            arch: 386
            ext: .exe
          - os: windows
            arch: arm64
            ext: .exe
          - os: linux
            arch: amd64
          - os: linux
            arch: 386
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: freebsd
            arch: amd64
          - os: freebsd
            arch: 386
          - os: freebsd
            arch: arm
          - os: openbsd
            arch: amd64
          - os: openbsd
            arch: 386
          - os: openbsd
            arch: arm
          - os: netbsd
            arch: amd64
          - os: netbsd
            arch: 386
          - os: netbsd
            arch: arm64
          - os: android
            arch: arm64

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18'
      
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -o labpi-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: labpi-${{ matrix.os }}-${{ matrix.arch }}
          path: labpi-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate tag
        id: tag
        run: |
          TAG="v$(date +%Y.%m.%d.%H%M%S)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare files
        run: |
          mkdir -p dist
          find artifacts -type f -exec mv {} dist/ \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: "Release"
          files: dist/*
          make_latest: true
          overwrite: true

      # - name: Create Release
      #   uses: ncipollo/release-action@v1
      #   with:
      #     tag: ${{ steps.tag.outputs.tag }}
      #     artifacts: "dist/*"
      #     draft: false
      #     prerelease: false
      #     token: ${{ secrets.GITHUB_TOKEN }}
